<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボーイスカウト名取第一団</title>
    
    <style>
        /* --- 1. 基本設定（変数で管理し引き継ぎやすく） --- */
        :root {
            --scout-green: #2e5a27;
            --scout-yellow: #f4d03f;
            --bg-light: #f4f7f6;
            --text-dark: #333;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            font-family: "Helvetica Neue", Arial, "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-light);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- 2. ヘッダー（スマホ対応ハンバーガー込） --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            background: rgba(46, 90, 39, 0.95);
            z-index: 1000;
            color: var(--white);
            backdrop-filter: blur(5px);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            color: var(--white);
            z-index: 1001;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--white);
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--scout-yellow); }

        /* ハンバーガーボタン */
        .hamburger {
            display: none;
            cursor: pointer;
            z-index: 1001;
            background: none;
            border: none;
            padding: 10px;
        }

        .hamburger span {
            display: block;
            width: 25px;
            height: 3px;
            background: var(--white);
            margin: 5px 0;
            transition: 0.4s;
        }

        /* --- 3. 自動横スクロール・スライドショー --- */
        .slider-container {
            width: 100%;
            height: 55vh;
            overflow: hidden;
            position: relative;
            margin-top: 70px;
            background: #eee;
        }

        .slider-track {
            display: flex;
            /* 画像5枚分を無限ループさせる設定 */
            width: calc(400px * 10); 
            animation: scroll 40s linear infinite;
        }

        .slider-track img {
            width: 400px;
            height: 55vh;
            object-fit: cover; /* 比率がバラバラでも中央でトリミング */
            flex-shrink: 0;
            border-right: 4px solid var(--white);
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-400px * 5)); }
        }

        /* --- 4. 線が引かれるアニメーションテキスト --- */
        .copy-section {
            text-align: center;
            padding: 80px 20px;
            background: var(--white);
        }

        .animated-text-wrapper {
            display: inline-block;
            position: relative;
            padding: 15px 0;
        }

        .animated-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--scout-green);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease forwards 0.8s;
            letter-spacing: 0.1em;
        }

        .animated-text-wrapper::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background: var(--scout-yellow);
            animation: lineDraw 1.2s ease forwards;
            transform: translateX(-50%);
        }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes lineDraw { to { width: 110%; } }

        /* --- 5. ポータルサイト（前バージョンの見やすいカードデザイン） --- */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .section-title { border-left: 5px solid var(--scout-green); padding-left: 15px; margin-bottom: 40px; }

        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-dark);
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 6px solid var(--scout-yellow); /* アクセントの黄色 */
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .card h3 { color: var(--scout-green); margin-bottom: 15px; font-size: 1.4rem; }
        .card p { font-size: 0.9rem; color: #666; margin: 0; }

        /* --- 6. スマホレスポンシブ調整 --- */
        @media (max-width: 768px) {
            header { padding: 0 20px; }
            .hamburger { display: block; }
            .nav-links {
                position: fixed; right: -100%; top: 0; width: 75%; height: 100vh;
                background: var(--scout-green); flex-direction: column;
                align-items: center; justify-content: center; transition: 0.5s;
            }
            .nav-links.active { right: 0; }
            .nav-links li { margin: 20px 0; }
            .animated-text { font-size: 1.3rem; }
            .slider-track img { width: 300px; }
            @keyframes scroll {
                0% { transform: translateX(0); }
                100% { transform: translateX(calc(-300px * 5)); }
            }
        }

        footer { text-align: center; padding: 60px; background: #333; color: #999; margin-top: 100px; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">ボーイスカウト名取第一団</a>
        <button class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </button>
        <nav>
            <ul class="nav-links" id="nav-menu">
                <li><a href="#portal">ポータル</a></li>
                <li><a href="fee.html">費用について</a></li>
                <li><a href="#">年間活動計画</a></li>
                <li><a href="#">お問い合わせ</a></li>
            </ul>
        </nav>
    </header>

    <div class="slider-container">
        <div class="slider-track">
            <img src="photo1.jpg" alt="活動風景1">
            <img src="photo2.jpg" alt="活動風景2">
            <img src="photo3.jpg" alt="活動風景3">
            <img src="photo4.jpg" alt="活動風景4">
            <img src="photo5.jpg" alt="活動風景5">
            <img src="photo1.jpg" alt="活動風景1">
            <img src="photo2.jpg" alt="活動風景2">
            <img src="photo3.jpg" alt="活動風景3">
            <img src="photo4.jpg" alt="活動風景4">
            <img src="photo5.jpg" alt="活動風景5">
        </div>
    </div>

    <div class="copy-section">
        <div class="animated-text-wrapper">
            <div class="animated-text">普段できない経験がここにある</div>
        </div>
    </div>

    <div class="container" id="portal">
        <h2 class="section-title">ポータルメニュー</h2>
        <div class="portal-grid">
            <a href="#" class="card">
                <h3>各隊のSNS</h3>
                <p>InstagramやFacebookで<br>最新の活動を公開中！</p>
            </a>
            <a href="fee.html" class="card">
                <h3>費用について</h3>
                <p>入団から継続までにかかる<br>費用を分かりやすく表にしました</p>
            </a>
            <a href="#" class="card">
                <h3>年間活動計画</h3>
                <p>キャンプ、募金、地域奉仕など<br>ワクワクする予定がいっぱい</p>
            </a>
            <a href="#" class="card">
                <h3>運営資料</h3>
                <p>次期担当者への引き継ぎや<br>マニュアルはこちらから</p>
            </a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 ボーイスカウト名取第一団</p>
        <p style="font-size: 0.7rem; margin-top: 10px;">GitHub Pagesで運用中</p>
    </footer>

    <script>
        // ハンバーガーメニューの開閉制御
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        // ハンバーガーのアニメーション
        hamburger.onclick = function() {
            this.classList.toggle('active');
        }

        // メニュークリックで閉じる
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });
    </script>
</body>
</html>
