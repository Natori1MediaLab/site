<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボーイスカウト名取第一団</title>
    
    <style>
        :root {
            --scout-green: #2e5a27;
            --scout-yellow: #f4d03f;
            --bg-light: #f4f7f6;
            --text-dark: #333;
            --white: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            overflow-x: hidden;
            font-family: sans-serif;
            scroll-behavior: smooth;
        }

        /* --- 1. 自動横スクロール・スライドショー --- */
        .slider-container {
            width: 100%;
            height: 60vh; /* 写真の高さを調整（スマホでも見やすい高さ） */
            overflow: hidden;
            position: relative;
            margin-top: 70px; /* ヘッダーの高さ分 */
            background: #000;
        }

        .slider-track {
            display: flex;
            width: calc(250px * 10); /* 写真5枚 × 2（ループ用） */
            animation: scroll 30s linear infinite;
        }

        .slider-track img {
            width: 400px; /* 写真の横幅 */
            height: 60vh;
            object-fit: cover; /* 比率が違っても綺麗にトリミング */
            flex-shrink: 0;
            padding: 0 5px; /* 写真の間の隙間 */
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-400px * 5)); } /* 5枚分進んだら戻る */
        }

        /* --- 2. キャッチコピー・アニメーション --- */
        .copy-section {
            text-align: center;
            padding: 60px 20px;
            background: var(--white);
        }

        .animated-text-wrapper {
            display: inline-block;
            position: relative;
            padding: 10px 0;
        }

        .animated-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--scout-green);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease forwards 0.5s;
            letter-spacing: 0.1em;
        }

        /* 線が引かれるアニメーション */
        .animated-text-wrapper::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background: var(--scout-yellow);
            transition: all 0.8s ease;
            animation: lineDraw 1s ease forwards;
            transform: translateX(-50%);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes lineDraw {
            to { width: 100%; }
        }

        /* 以前のヘッダー・カード等のCSSはここに続く（省略） */
        /* ... (前回のコードをそのまま使用) ... */
        
        header { position: fixed; top: 0; width: 100%; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; box-sizing: border-box; background: var(--scout-green); z-index: 1000; color: white; }
        .logo { color: white; text-decoration: none; font-weight: bold; }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; font-size: 0.9rem; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .portal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { display: block; background: white; padding: 30px; border-radius: 15px; text-decoration: none; color: #333; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">ボーイスカウト名取第一団</a>
        <nav>
            <ul class="nav-links">
                <li><a href="#portal">ポータル</a></li>
                <li><a href="fee.html">費用について</a></li>
                <li><a href="#">活動計画</a></li>
            </ul>
        </nav>
    </header>

    <div class="slider-container">
        <div class="slider-track">
            <img src="photo1.jpg" alt="活動風景1">
            <img src="photo2.jpg" alt="活動風景2">
            <img src="photo3.jpg" alt="活動風景3">
            <img src="photo4.jpg" alt="活動風景4">
            <img src="photo5.jpg" alt="活動風景5">
            <img src="photo1.jpg" alt="活動風景1">
            <img src="photo2.jpg" alt="活動風景2">
            <img src="photo3.jpg" alt="活動風景3">
            <img src="photo4.jpg" alt="活動風景4">
            <img src="photo5.jpg" alt="活動風景5">
        </div>
    </div>

    <div class="copy-section">
        <div class="animated-text-wrapper">
            <div class="animated-text">普段できない経験がここにある</div>
        </div>
    </div>

    <div class="container" id="portal">
        <div class="portal-grid">
            <a href="#" class="card"><h3>各隊のSNS</h3><p>活動をチェック！</p></a>
            <a href="fee.html" class="card"><h3>費用について</h3><p>入団金・会費の詳細</p></a>
            <a href="#" class="card"><h3>年間活動計画</h3><p>これからの予定</p></a>
            <a href="#" class="card"><h3>運営資料</h3><p>引き継ぎ・マニュアル</p></a>
        </div>
    </div>

</body>
</html>
