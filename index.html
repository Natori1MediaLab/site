<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボーイスカウト名取第一団</title>
    
    <style>
        /* --- 変数設定（色やフォントをここで一括管理。引き継ぎやすさ重視） --- */
        :root {
            --scout-green: #2e5a27;
            --scout-yellow: #f4d03f;
            --bg-light: #f4f7f6;
            --text-dark: #333;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            font-family: "Helvetica Neue", "Arial", "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            scroll-behavior: smooth; /* スムーズスクロール */
        }

        /* 1. 背景動画・メインビジュアル */
        .hero {
            position: relative;
            height: 80vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.7); /* 動画を少し暗くして文字を見やすく */
        }

        /* 2. ヘッダー */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            box-sizing: border-box;
            background: rgba(46, 90, 39, 0.9); /* スカウトグリーン（半透明） */
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s ease;
        }

        nav ul li a:hover {
            color: var(--scout-yellow);
            transform: translateY(-2px);
            display: inline-block;
        }

        /* 3. コンテンツエリア */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            border-left: 5px solid var(--scout-green);
            padding-left: 15px;
            margin-bottom: 30px;
        }

        /* ポータルボタン（SNS・活動計画など） */
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--text-dark);
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 遊び心のある動き */
            border: 2px solid transparent;
        }

        .card:hover {
            transform: scale(1.05) rotate(1deg); /* ぷるっと動く */
            border-color: var(--scout-green);
        }

        .card i {
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
        }

        /* 4. スマホ対応 */
        @media (max-width: 768px) {
            header {
                padding: 15px;
                flex-direction: column;
                gap: 10px;
            }
            nav ul {
                gap: 10px;
                flex-wrap: wrap;
                justify-content: center;
            }
            nav ul li a {
                font-size: 0.8rem;
            }
            .hero {
                height: 50vh;
            }
        }

        /* 遊び心：ロープが揺れるようなアニメーション */
        @keyframes sway {
            0% { transform: rotate(-2deg); }
            100% { transform: rotate(2deg); }
        }
        .sway-text {
            display: inline-block;
            animation: sway 2s infinite alternate ease-in-out;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">ボーイスカウト名取第一団</a>
        <nav>
            <ul>
                <li><a href="#portal">ポータル</a></li>
                <li><a href="#money">費用について</a></li>
                <li><a href="#plan">活動計画</a></li>
                <li><a href="#admin">管理用</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <video id="video-bg" autoplay muted loop playsinline>
            <source src="bg-video.mp4" type="video/mp4">
        </video>
        <div style="text-align: center;">
            <h1 style="font-size: 3rem; margin-bottom: 0;">備えよ常に</h1>
            <p class="sway-text">名取の自然で、たくましく遊ぼう！</p>
        </div>
    </section>

    <div class="container" id="portal">
        <h2 class="section-title">隊員・保護者向けポータル</h2>
        <div class="portal-grid">
            <a href="#" class="card">
                <h3>各隊のSNS</h3>
                <p>活動の様子をチェック！</p>
            </a>
            <a href="#" class="card" id="money">
                <h3>費用について</h3>
                <p>入団金・月会費など</p>
            </a>
            <a href="#" class="card" id="plan">
                <h3>年間活動計画</h3>
                <p>キャンプや集会の日程</p>
            </a>
            <a href="#" class="card">
                <h3>お問い合わせ</h3>
                <p>見学・体験随時受付中</p>
            </a>
        </div>
    </div>

    <footer style="text-align: center; padding: 40px; background: #ddd; margin-top: 50px;">
        <p>&copy; 2024 ボーイスカウト名取第一団</p>
        <p style="font-size: 0.8rem; color: #777;">GitHub Pagesで運用中（引き継ぎ用：このサイトの修正はindex.htmlを編集するだけ！）</p>
    </footer>

</body>
</html>
