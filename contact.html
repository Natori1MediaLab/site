<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体験・入団のお申し込み | ボーイスカウト名取第1団</title>
    <style>
        /* --- 1. 基本設定 --- */
        :root {
            --scout-green: #2e5a27;
            --scout-yellow: #f4d03f;
            --bg-light: #f4f7f6;
            --text-dark: #333;
            --white: #ffffff;
            --error: #e74c3c;
        }

        body, html {
            margin: 0; padding: 0; width: 100%;
            font-family: "Helvetica Neue", Arial, "Hiragino Sans", "Meiryo", sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .sp-br { display: none; }

        /* --- 2. ヘッダー（index.htmlと完全統一） --- */
        header {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; box-sizing: border-box;
            background: rgba(46, 90, 39, 0.95); z-index: 1000;
            color: var(--white); backdrop-filter: blur(5px);
        }

        .logo {
            text-decoration: none; color: var(--white); z-index: 1100; flex-shrink: 0;
            display: flex; flex-direction: column; justify-content: center;
            line-height: 1.2;
        }
        .logo .main-name { font-size: 1.1rem; font-weight: bold; display: block; }
        .logo .sub-name { font-size: 0.7rem; opacity: 0.8; margin-top: 2px; }

        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--white); display: block; transition: 0.3s ease; }
        .nav-links a .ja { display: block; font-size: 0.8rem; font-weight: bold; text-align: center; }
        .nav-links a .en { display: block; font-size: 0.55rem; opacity: 0.7; text-transform: uppercase; text-align: center; }
        .nav-links a:hover { color: var(--scout-yellow); transform: translateY(-2px); }

        .hamburger {
            display: none; cursor: pointer; z-index: 1100; background: none; border: none;
            width: 30px; height: 30px; position: relative; padding: 0; margin-left: auto;
            align-self: center;
        }
        .hamburger span {
            display: block; position: absolute; left: 0; width: 30px; height: 3px;
            background: var(--white); border-radius: 3px; transition: 0.4s;
        }
        .hamburger span:nth-child(1) { top: 4px; }
        .hamburger span:nth-child(2) { top: 14px; }
        .hamburger span:nth-child(3) { top: 24px; }
        .hamburger.active span:nth-child(1) { transform: translateY(10px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }

        /* --- 3. フォームレイアウト --- */
        .container { max-width: 800px; margin: 140px auto 60px; padding: 0 20px; }

        .form-header { text-align: center; margin-bottom: 40px; }
        .form-header h1 { color: var(--scout-green); font-size: 1.8rem; margin-bottom: 15px; }
        .form-header p { font-size: 0.95rem; color: #666; line-height: 1.8; }

        .contact-form {
            background: var(--white); padding: 40px; border-radius: 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 25px; }
        .form-group label {
            display: block; font-weight: bold; margin-bottom: 8px;
            color: var(--scout-green); font-size: 0.95rem;
        }
        .form-group label .required {
            background: var(--error); color: white; font-size: 0.7rem;
            padding: 2px 6px; border-radius: 3px; margin-left: 8px;
        }
        .form-group label .optional {
            background: #999; color: white; font-size: 0.7rem;
            padding: 2px 6px; border-radius: 3px; margin-left: 8px;
        }

        input[type="text"], input[type="email"], input[type="tel"], select, textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            box-sizing: border-box; font-size: 1rem; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--scout-green); box-shadow: 0 0 0 3px rgba(46, 90, 39, 0.1);
        }

        .radio-group { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
        .radio-group label { font-weight: normal; color: var(--text-dark); cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .form-row { display: flex; gap: 20px; }
        .form-row .form-group { flex: 1; }

        .submit-btn {
            display: block; width: 100%; max-width: 300px; margin: 40px auto 0;
            padding: 18px; background: var(--scout-green); color: white;
            border: none; border-radius: 50px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(46, 90, 39, 0.3);
        }
        .submit-btn:hover { background: #3a7531; transform: translateY(-2px); }

        .privacy-note {
            margin-top: 30px; font-size: 0.8rem; color: #888; text-align: center; line-height: 1.8;
        }

        /* --- 4. レスポンシブ --- */
        @media (max-width: 768px) {
            .sp-br { display: inline; }
            header { padding: 0 20px; }
            .hamburger { display: block; }
            .nav-links {
                position: fixed; right: -100%; top: 0; width: 80%; height: 100vh;
                background: rgba(46, 90, 39, 0.98); flex-direction: column;
                align-items: center; justify-content: center; transition: 0.4s ease-in-out;
                z-index: 1050; gap: 35px;
                box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            }
            .nav-links.active { right: 0; }
            .nav-links a .ja { font-size: 1.4rem; font-weight: bold; }
            .nav-links a .en { font-size: 0.8rem; margin-top: 5px; opacity: 0.8; }
            
            .container { margin-top: 110px; }
            .contact-form { padding: 25px 15px; }
            .form-header h1 { font-size: 1.5rem; }
            .form-row { flex-direction: column; gap: 0; }
        }

        footer { text-align: center; padding: 60px 20px; background: #333; color: #ccc; margin-top: 100px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <span class="main-name">ボーイスカウト名取第1団</span>
            <span class="sub-name">Boy Scouts Natori 1st Group</span>
        </a>

        <nav id="nav-container">
            <ul class="nav-links" id="nav-menu">
                <li><a href="about.html"><span class="ja">ボーイスカウトとは</span><span class="en">About</span></a></li>
                <li><a href="sns.html"><span class="ja">各隊のSNS</span><span class="en">Social Media</span></a></li>
                <li><a href="schedule.html"><span class="ja">年間活動計画</span><span class="en">Schedule</span></a></li>
                <li><a href="fee.html"><span class="ja">費用について</span><span class="en">Fees</span></a></li>
                <li><a href="contact.html"><span class="ja">お問い合わせ</span><span class="en">Contact</span></a></li>
            </ul>
        </nav>

        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </header>

    <div class="container">
        <div class="form-header">
            <h1>体験・入団のお申し込み</h1>
            <p>
                名取の自然の中で、新しい冒険を<br class="sp-br">一緒に始めましょう！<br>
                担当者より、折り返し活動日の<br class="sp-br">詳細などをご連絡いたします。
            </p>
        </div>

        <form class="contact-form" action="https://ssgform.com/s/sguce1ckNBjV" method="post">
            
            <div class="form-group">
                <label>お問い合わせ種別<span class="required">必須</span></label>
                <div class="radio-group">
                    <label><input type="radio" name="お問い合わせ種類" value="無料体験・見学希望" checked> 無料体験・見学希望</label>
                    <label><input type="radio" name="お問い合わせ種類" value="入団希望・相談"> 入団希望・相談</label>
                    <label><input type="radio" name="お問い合わせ種類" value="その他"> その他</label>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

            <div class="form-group">
                <label for="p-name">保護者様のお名前<span class="required">必須</span></label>
                <input type="text" id="p-name" name="保護者様お名前" placeholder="例：名取 太郎" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">メールアドレス<span class="required">必須</span></label>
                    <input type="email" id="email" name="メールアドレス" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label for="tel">電話番号<span class="required">必須</span></label>
                    <input type="tel" id="tel" name="電話番号" placeholder="090-0000-0000" required>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

            <div class="form-row">
                <div class="form-group">
                    <label for="c-name">お子様のお名前<span class="optional">任意</span></label>
                    <input type="text" id="c-name" name="お子様お名前" placeholder="例：名取 次郎">
                </div>
                <div class="form-group">
                    <label for="c-kana">お子様のお名前（ふりがな）<span class="optional">任意</span></label>
                    <input type="text" id="c-kana" name="お子様ふりがな" placeholder="例：なとり じろう">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>お子様の性別<span class="optional">任意</span></label>
                    <div class="radio-group">
                        <label><input type="radio" name="お子様性別" value="男の子"> 男の子</label>
                        <label><input type="radio" name="お子様性別" value="女の子"> 女の子</label>
                        <label><input type="radio" name="お子様性別" value="回答しない"> 回答しない</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="grade">現在の学年<span class="required">必須</span></label>
                    <select id="grade" name="お子様の学年" required>
                        <option value="">選択してください</option>
                        <option value="年長">幼稚園・保育園（年長）</option>
                        <option value="小1">小学校 1年生</option>
                        <option value="小2">小学校 2年生</option>
                        <option value="小3">小学校 3年生</option>
                        <option value="小4">小学校 4年生</option>
                        <option value="小5">小学校 5年生</option>
                        <option value="小6">小学校 6年生</option>
                        <option value="中学生以上">中学生以上</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="school">学校（幼稚園・保育園）名<span class="optional">任意</span></label>
                <input type="text" id="school" name="学校名" placeholder="例：名取市立〇〇小学校">
            </div>

            <div class="form-group">
                <label for="message">ご質問・ご要望など</label>
                <textarea id="message" name="メッセージ" rows="5" placeholder="体験希望日や、気になっていることなどお気軽にご記入ください。"></textarea>
            </div>

            <button type="submit" class="submit-btn">送信する</button>

            <div class="privacy-note">
                送信いただいた個人情報は、<br class="sp-br">
                ボーイスカウト名取第1団の活動に関する<br class="sp-br">
                ご連絡以外には使用いたしません。
            </div>
        </form>
    </div>

    <footer>
        <div class="copyright">&copy; 2026 ボーイスカウト名取第1団</div>
    </footer>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');

        // ハンバーガーメニューの開閉
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        // リンククリック時にメニューを閉じる
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });
    </script>
</body>
</html>
